name: Build & Deploy Z Grid

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: self-hosted
        environment: Deploy
        env:
            KUBECONFIG: /home/r16a-runner/.kube/config
            REGISTRY: registry.r16a.cloud
            BACKEND_IMAGE: registry.r16a.cloud/r16a-z-grid-api
            FRONTEND_IMAGE: registry.r16a.cloud/r16a-z-grid-web

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login private registry
              run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ env.REGISTRY }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            - name: Build and push backend image
              run: |
                  docker build \
                    -t "${{ env.BACKEND_IMAGE }}:${{ github.sha }}" \
                    -t "${{ env.BACKEND_IMAGE }}:latest" \
                    ./backend
                  docker push "${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
                  docker push "${{ env.BACKEND_IMAGE }}:latest"

            - name: Build and push frontend image
              run: |
                  docker build \
                    -t "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}" \
                    -t "${{ env.FRONTEND_IMAGE }}:latest" \
                    ./frontend
                  docker push "${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
                  docker push "${{ env.FRONTEND_IMAGE }}:latest"

            - name: Update deployment images in manifests
              run: |
                  sed -i "s|image: registry.r16a.cloud/r16a-z-grid-api:.*|image: registry.r16a.cloud/r16a-z-grid-api:${{ github.sha }}|" infra/backend-deployment.yaml
                  sed -i "s|image: registry.r16a.cloud/r16a-z-grid-web:.*|image: registry.r16a.cloud/r16a-z-grid-web:${{ github.sha }}|" infra/frontend-deployment.yaml

            - name: Apply Kubernetes manifests
              run: |
                  kubectl apply -k infra

            - name: Wait for rollout
              run: |
                  kubectl rollout status deployment/r16a-z-grid-api -n r16a-z-grid --timeout=180s
                  kubectl rollout status deployment/r16a-z-grid-web -n r16a-z-grid --timeout=180s
