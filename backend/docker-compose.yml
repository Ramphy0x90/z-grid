version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeus-backend
    depends_on:
      db:
        condition: service_healthy
      py-engine:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://db:5432/zeus
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ENGINE_REMOTE_PYTHON_BASE_URL: http://py-engine:8090
    ports:
      - "8080:8080"
    restart: unless-stopped

  py-engine:
    build:
      context: ../py-engine
      dockerfile: Dockerfile
    container_name: zeus-py-engine
    ports:
      - "8090:8090"
    restart: unless-stopped

  db:
    image: postgres:17
    container_name: zeus-db
    environment:
      POSTGRES_DB: zeus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - zeus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zeus"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  zeus_postgres_data:
