apiVersion: apps/v1
kind: Deployment
metadata:
    name: r16a-z-grid-py-engine
    namespace: r16a-z-grid
spec:
    replicas: 1
    selector:
        matchLabels:
            app: r16a-z-grid-py-engine
    template:
        metadata:
            labels:
                app: r16a-z-grid-py-engine
        spec:
            containers:
                - name: py-engine
                  image: registry.r16a.cloud/r16a-z-grid-py-engine:latest
                  imagePullPolicy: Always
                  ports:
                      - containerPort: 8090
                  readinessProbe:
                      httpGet:
                          path: /healthz
                          port: 8090
                      initialDelaySeconds: 10
                      periodSeconds: 10
                      timeoutSeconds: 2
                  livenessProbe:
                      httpGet:
                          path: /healthz
                          port: 8090
                      initialDelaySeconds: 30
                      periodSeconds: 20
                      timeoutSeconds: 2
