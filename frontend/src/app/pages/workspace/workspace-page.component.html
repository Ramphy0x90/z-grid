<section class="workspace-layout" aria-live="polite">
  <div class="workspace-panels" #workspacePanels [style.grid-template-columns]="layoutColumns()">
    <article class="page-panel">
      <h2>{{ page()?.label }}</h2>
      <p>
        Project:
        <strong>{{ project()?.name }}</strong>
      </p>
      <p class="subtitle">
        Page workspace content stays on the left while the grid viewer remains docked to the right.
      </p>
    </article>

    <button
      #layoutDivider
      type="button"
      class="layout-divider"
      [class.layout-divider-dragging]="isDividerDragging()"
      role="separator"
      aria-label="Resize page and grid viewer panels"
      aria-orientation="vertical"
      [attr.aria-valuemin]="25"
      [attr.aria-valuemax]="75"
      [attr.aria-valuenow]="layoutSplitPercent()"
      [attr.aria-valuetext]="layoutValueText()"
      (pointerdown)="startDividerDrag($event)"
      (pointermove)="dragDivider($event)"
      (pointerup)="endDividerDrag($event)"
      (pointercancel)="endDividerDrag($event)"
      (keydown)="onDividerKeydown($event)"
    >
      <span class="layout-divider-handle" aria-hidden="true"></span>
    </button>

    <aside class="grid-viewer-panel" aria-label="Grid viewer panel">
      <app-grid-viewer />
    </aside>
  </div>
</section>
