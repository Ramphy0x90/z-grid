<section class="grid-viewer" aria-label="Grid viewer">
  <div class="viewer-body" #viewerBody [class.viewer-body-placement]="placementMode() === 'bus'">
    <div class="top-toolbar" role="toolbar" aria-label="Grid viewer controls">
      <div class="view-switch" role="tablist" aria-label="Grid view mode">
        <button
          type="button"
          role="tab"
          class="view-toggle"
          [class.view-toggle-active]="activeView() === 'schematic'"
          [attr.aria-selected]="activeView() === 'schematic'"
          (click)="setActiveView('schematic')"
        >
          Schematic
        </button>
        <button
          type="button"
          role="tab"
          class="view-toggle"
          [class.view-toggle-active]="activeView() === 'map'"
          [attr.aria-selected]="activeView() === 'map'"
          (click)="setActiveView('map')"
        >
          Map
        </button>
      </div>
      <button type="button" class="toolbar-button" (click)="resetViewport()">Fit view</button>
      <span class="chip" aria-live="polite">Total elements: {{ totalElements() }}</span>
      <button type="button" class="toolbar-button" (click)="zoomOut()" aria-label="Zoom out">
        -
      </button>
      <button type="button" class="toolbar-button" (click)="zoomIn()" aria-label="Zoom in">
        +
      </button>
    </div>

    <div class="left-toolbar" role="toolbar" aria-label="Grid element placement tools">
      <button
        type="button"
        class="tool-button"
        [class.tool-button-active]="placementMode() === 'bus'"
        [attr.aria-pressed]="placementMode() === 'bus'"
        (click)="toggleBusPlacement()"
        aria-label="Place bus"
      >
        B
      </button>
    </div>

    @if (placementMode() === 'bus') {
      <p class="placement-hint" aria-live="polite">Click the grid to place one bus.</p>
    }

    <canvas
      #schematicCanvas
      class="viewer-canvas"
      [class.viewer-canvas-hidden]="activeView() !== 'schematic'"
      role="img"
      aria-label="Grid schematic canvas. Use drag to pan and wheel to zoom."
    ></canvas>
    <canvas
      #mapCanvas
      class="viewer-canvas"
      [class.viewer-canvas-hidden]="activeView() !== 'map'"
      role="img"
      aria-label="Grid map canvas. Use drag to pan and wheel to zoom."
    ></canvas>
  </div>
</section>
