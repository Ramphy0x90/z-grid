<section class="grid-viewer" aria-label="Grid viewer">
	<div class="viewer-body" #viewerBody [class.viewer-body-placement]="placementMode() !== null">
		<app-grid-viewer-toolbar
			[activeView]="activeView()"
			[mapStyleOptions]="mapStyleOptions"
			[selectedMapStyleId]="selectedMapStyleId()"
			[totalElements]="totalElements()"
			[editEnabled]="editEnabled()"
			[placementMode]="placementMode()"
			(activeViewChange)="setActiveView($event)"
			(mapStyleChange)="onMapStyleIdChange($event)"
			(fitViewRequested)="resetViewport()"
			(zoomInRequested)="zoomIn()"
			(zoomOutRequested)="zoomOut()"
			(placementModeToggleRequested)="togglePlacementMode($event)"
		/>

		@if (editEnabled() && placementMode()) {
			<p class="placement-hint" aria-live="polite">{{ placementHint() }}</p>
		}
		@if (inspectorSelection(); as selected) {
			<aside class="inspector-floating" aria-label="Selected element inspector">
				<app-grid-element-inspector
					[selection]="selected"
					[busIds]="inspectorBusIds()"
					(applyRequested)="onInspectorApply($event)"
				/>
			</aside>
		}
		@if (editEnabled() && connectionPreview(); as preview) {
			<svg class="connection-preview" aria-hidden="true">
				<line
					[attr.x1]="preview.x1"
					[attr.y1]="preview.y1"
					[attr.x2]="preview.x2"
					[attr.y2]="preview.y2"
				></line>
			</svg>
		}
		<svg class="placed-connections-overlay" aria-hidden="true">
			@for (segment of placedConnectionOverlays(); track $index) {
				<line
					[attr.x1]="segment.x1"
					[attr.y1]="segment.y1"
					[attr.x2]="segment.x2"
					[attr.y2]="segment.y2"
				></line>
			}
		</svg>

		<div
			#mapHost
			class="map-host"
			[class.viewer-canvas-hidden]="activeView() !== 'map'"
			aria-hidden="true"
		></div>
		<canvas
			#schematicCanvas
			class="viewer-canvas"
			[class.viewer-canvas-hidden]="activeView() !== 'schematic'"
			role="img"
			aria-label="Grid schematic canvas. Use drag to pan and wheel to zoom."
		></canvas>
		<canvas
			#mapCanvas
			class="viewer-canvas viewer-canvas-map"
			[class.viewer-canvas-hidden]="activeView() !== 'map'"
			role="img"
			aria-label="Grid map canvas. Use drag to pan and wheel to zoom."
		></canvas>
	</div>
</section>
