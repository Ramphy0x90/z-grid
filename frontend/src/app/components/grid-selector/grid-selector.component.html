<section class="grid-selector" aria-label="Grid selector">
  @if (hasAvailableGrids()) {
    <label class="selector-label" for="workspace-grid-selector">{{ label() }}</label>
    <div class="select-wrapper">
      <select
        id="workspace-grid-selector"
        class="selector-input"
        [value]="selectedGridId()"
        (change)="onGridChange($event)"
      >
        @for (grid of grids(); track grid.id) {
          <option [value]="grid.id">{{ grid.name }}</option>
        }
      </select>
      <i class="bi bi-chevron-down selector-icon" aria-hidden="true"></i>
    </div>
  } @else {
    <p class="selector-empty">No grids available for the selected project.</p>
  }
</section>
