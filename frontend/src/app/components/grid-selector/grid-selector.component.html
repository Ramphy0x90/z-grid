<section class="grid-selector" aria-label="Grid selector">
	<label class="selector-label" for="workspace-grid-selector">Grid</label>
	<input
		#importFileInput
		type="file"
		accept="application/json,.json"
		hidden
		(change)="onImportFileChange($event)"
	/>
	<div class="controls-row" (focusout)="onMenuFocusOut($event)">
		<div class="select-wrapper">
			<select
				id="workspace-grid-selector"
				class="selector-input"
				[ngModel]="gridSelectValue()"
				(ngModelChange)="onGridModelChange($event)"
			>
				@if (!hasAvailableGrids()) {
					<option value="">No grids available</option>
				} @else {
					@for (grid of grids(); track grid.id) {
						<option [value]="grid.id">{{ grid.name }}</option>
					}
				}
			</select>
			<i class="bi bi-chevron-down selector-icon" aria-hidden="true"></i>
		</div>

		<div class="menu-wrapper">
			<button
				type="button"
				class="menu-trigger"
				aria-label="Grid actions"
				aria-haspopup="menu"
				[attr.aria-expanded]="isMenuOpen()"
				[disabled]="isAnyActionRunning()"
				(click)="toggleMenu()"
			>
				<i class="bi bi-three-dots-vertical" aria-hidden="true"></i>
			</button>
			@if (isMenuOpen()) {
				<div class="action-menu" role="menu" aria-label="Grid actions menu">
					<button
						type="button"
						class="action-menu-item"
						role="menuitem"
						[disabled]="isAnyActionRunning()"
						(click)="onImportClick(importFileInput)"
					>
						Import JSON
					</button>
					<button
						type="button"
						class="action-menu-item"
						role="menuitem"
						[disabled]="isAnyActionRunning() || !hasAvailableGrids()"
						(click)="onExportClick()"
					>
						Export JSON
					</button>
					<button
						type="button"
						class="action-menu-item"
						role="menuitem"
						[disabled]="isAnyActionRunning() || !hasAvailableGrids()"
						(click)="onDuplicateClick()"
					>
						Duplicate
					</button>
					<button
						type="button"
						class="action-menu-item action-menu-item-danger"
						role="menuitem"
						[disabled]="isAnyActionRunning() || !hasAvailableGrids()"
						(click)="onDeleteClick()"
					>
						Delete
					</button>
				</div>
			}
		</div>
	</div>
</section>
